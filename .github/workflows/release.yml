name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need full history so `git log` resolves the tagged commit's date.
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
      - name: Set SOURCE_DATE_EPOCH from tag commit
        # Reproducible builds: lock archive/file mtimes to the tagged commit.
        # `head_commit.timestamp` is ISO-8601 — setuptools needs Unix epoch.
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/basic-ipfs
    permissions:
      id-token: write  # OIDC for trusted publishing — no API token in repo secrets
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        # Trusted publisher must be configured at:
        # https://pypi.org/manage/project/basic-ipfs/settings/publishing/
        # GitHub: lukeprofits/basic_ipfs   Workflow: release.yml   Environment: pypi
