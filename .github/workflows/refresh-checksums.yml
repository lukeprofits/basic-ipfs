name: Refresh Kubo checksums

# Weekly probe of the latest Kubo release. If a new tag exists upstream,
# fetch its SHA-512 from both dist.ipfs.tech and github.com/ipfs/kubo
# (the cross-source agreement check lives in scripts/refresh_checksums.py)
# and open a PR adding the entries to basic_ipfs/kubo_checksums.py.
#
# Refusing to ship until a maintainer reviews and merges keeps the
# baked-in-hash trust model intact: even if upstream were to publish a
# malicious release, this workflow would surface it as a PR rather than
# silently bumping the pinned version.

on:
  schedule:
    - cron: "0 9 * * 1"  # Mondays 09:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: "Kubo version (e.g. v0.41.0). Empty = use latest GitHub release."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Need a writable token for the bot push.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"

      - name: Resolve target version
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_VERSION" ]; then
            TARGET="$INPUT_VERSION"
          else
            TARGET=$(gh release view --repo ipfs/kubo --json tagName -q .tagName)
          fi
          echo "version=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Target Kubo version: $TARGET"

      - name: Install requests
        run: python -m pip install --upgrade pip requests

      - name: Refresh checksum table
        run: python scripts/refresh_checksums.py "${{ steps.target.outputs.version }}"

      - name: Commit and open PR if changed
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ steps.target.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain basic_ipfs/kubo_checksums.py)" ]; then
            echo "No checksum changes for $TARGET — nothing to do."
            exit 0
          fi
          BRANCH="chore/refresh-checksums-${TARGET}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add basic_ipfs/kubo_checksums.py
          git commit -m "Refresh Kubo checksums for $TARGET"
          git push --force-with-lease -u origin "$BRANCH"
          # Create or update the PR — `gh pr create` is idempotent when an
          # open PR for the same branch already exists.
          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR for $BRANCH already exists; force-push above updated it."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Refresh Kubo checksums for $TARGET" \
              --body "Automated refresh.\n\nRun \`scripts/refresh_checksums.py $TARGET\` and verified the dist.ipfs.tech and github.com release assets returned identical SHA-512 digests for every supported platform. Bump \`KUBO_VERSION\` in \`basic_ipfs/__init__.py\` in a follow-up commit before tagging a release."
          fi
