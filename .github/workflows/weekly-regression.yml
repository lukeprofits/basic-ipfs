name: Weekly regression (latest published)

# Runs the full test suite against the LATEST released wheel from PyPI, every
# Monday morning UTC. Catches regressions that come from upstream Kubo
# behavior changes between our releases (dist.ipfs.tech artifacts can move,
# checksums for new versions appear, etc.).

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install latest published basic-ipfs from PyPI
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade basic-ipfs pytest
      - name: Run repo's test suite against the installed package
        run: pytest tests/test_basic.py -v
        env:
          PYTHONUNBUFFERED: "1"
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Weekly regression failed",
              body: "The weekly regression run failed: " + context.serverUrl + "/" + context.repo.owner + "/" + context.repo.repo + "/actions/runs/" + context.runId,
              labels: ["regression"],
            });
