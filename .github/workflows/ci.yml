name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff
        run: ruff check basic_ipfs tests
      - name: mypy
        run: mypy basic_ipfs

  unit:
    # No daemon, no network — runs everywhere fast.
    name: unit (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-14, windows-latest]
        python: ["3.9", "3.13"]
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Unit + download + CLI tests
        run: pytest tests/test_unit.py tests/test_download.py tests/test_cli.py -v

  e2e:
    # Real Kubo, real daemon. Cached binary across runs.
    name: e2e (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.13"]
        # Cover 3.9 on Linux too — daemon-integration bugs that only show
        # under older subprocess / requests behaviour would otherwise
        # slip past the unit-only matrix.
        include:
          - os: ubuntu-latest
            python: "3.9"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Cache Kubo binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: basic_ipfs/bin
          key: kubo-${{ runner.os }}-${{ runner.arch }}-v0.40.1
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Basic + concurrency tests
        run: pytest tests/test_basic.py tests/test_concurrency.py -v
        env:
          PYTHONUNBUFFERED: "1"

  e2e-two-node:
    # Inter-node fetch is the load-bearing claim of the library, so make
    # sure it actually runs in CI. Linux-only because mDNS / peer discovery
    # is flakier on the macOS runner image.
    name: e2e two-node (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
      - name: Cache Kubo binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: basic_ipfs/bin
          key: kubo-${{ runner.os }}-${{ runner.arch }}-v0.40.1
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Two-node integration test
        run: pytest tests/test_two_node.py -v
        env:
          IPFS_E2E: "1"
          PYTHONUNBUFFERED: "1"

  build:
    name: build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Confirm wheel is platform-independent
        run: |
          ls dist/
          test -f dist/*-py3-none-any.whl
      - name: Confirm wheel and sdist contain no Kubo binary
        # The wheel must stay tiny (~28 KB, py3-none-any). MANIFEST.in's
        # `prune basic_ipfs/bin` and pyproject's exclude-package-data both
        # mean to keep the auto-downloaded Kubo binary out of distributions
        # — fail the build loudly if either ever leaks one in.
        run: |
          set -euo pipefail
          for whl in dist/*.whl; do
            echo "Inspecting $whl"
            if python -m zipfile -l "$whl" | grep -E '/bin(/|$)'; then
              echo "ERROR: wheel $whl contains a bin/ entry"
              exit 1
            fi
          done
          for sdist in dist/*.tar.gz; do
            echo "Inspecting $sdist"
            if tar -tzf "$sdist" | grep -E '/basic_ipfs/bin(/|$)'; then
              echo "ERROR: sdist $sdist contains basic_ipfs/bin"
              exit 1
            fi
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/*

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Extract runtime requirements from pyproject
        run: |
          python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb'))['project']; print('\n'.join(d['dependencies']))" > /tmp/audit-reqs.txt
          echo '--- audit-reqs.txt ---'
          cat /tmp/audit-reqs.txt
      - name: Audit runtime dependencies
        run: pip-audit --strict --requirement /tmp/audit-reqs.txt
