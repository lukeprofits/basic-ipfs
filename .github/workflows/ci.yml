name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff
        run: ruff check basic_ipfs tests
      - name: mypy
        run: mypy basic_ipfs

  unit:
    # No daemon, no network — runs everywhere fast.
    name: unit (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-14, windows-latest]
        python: ["3.9", "3.13"]
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Unit + download + CLI tests
        run: pytest tests/test_unit.py tests/test_download.py tests/test_cli.py -v

  e2e:
    # Real Kubo, real daemon. Cached binary across runs.
    name: e2e (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Cache Kubo binary
        uses: actions/cache@v4
        with:
          path: basic_ipfs/bin
          key: kubo-${{ runner.os }}-${{ runner.arch }}-v0.40.1
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Basic + concurrency tests
        run: pytest tests/test_basic.py tests/test_concurrency.py -v
        env:
          PYTHONUNBUFFERED: "1"

  build:
    name: build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Confirm wheel is platform-independent
        run: |
          ls dist/
          test -f dist/*-py3-none-any.whl
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Extract runtime requirements from pyproject
        run: |
          python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb'))['project']; print('\n'.join(d['dependencies']))" > /tmp/audit-reqs.txt
          echo '--- audit-reqs.txt ---'
          cat /tmp/audit-reqs.txt
      - name: Audit runtime dependencies
        run: pip-audit --strict --requirement /tmp/audit-reqs.txt
